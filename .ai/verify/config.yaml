# Configuración de verificación automática — Office Desk Booking
# Ref: AGENTS.md § 9, § 10
#
# Cada suite corresponde a un ticket/tarea y define los checks
# que deben pasar antes de considerar la tarea completada.
#
# Tipos soportados: filesystem, npm_script, json_check, api, playwright, performance, custom

defaults:
  timeout: 120
  exit_code: 0

suites:
  # === Verificaciones globales del proyecto ===

  global_build:
    description: 'Verifica que el proyecto compila correctamente'
    enabled: true
    related_spec: null
    verifications:
      - id: BUILD-1
        name: 'Build de Next.js sin errores'
        type: npm_script
        command: npm run build
        expected_result: PASS
        exit_code: 0
        timeout: 180

  global_lint:
    description: 'Verifica que el código pasa el linter'
    enabled: true
    related_spec: null
    verifications:
      - id: LINT-1
        name: 'ESLint sin errores'
        type: npm_script
        command: npm run lint
        expected_result: PASS
        exit_code: 0
        timeout: 60

  global_tests:
    description: 'Ejecuta todos los tests del proyecto'
    enabled: true
    related_spec: null
    verifications:
      - id: TEST-1
        name: 'Tests unitarios'
        type: npm_script
        command: npm run test:unit
        expected_result: PASS
        exit_code: 0
        timeout: 120
      - id: TEST-2
        name: 'Tests de integración'
        type: npm_script
        command: npm run test:integration
        expected_result: PASS
        exit_code: 0
        timeout: 120
      - id: TEST-3
        name: 'Tests de API'
        type: npm_script
        command: npm run test:api
        expected_result: PASS
        exit_code: 0
        timeout: 120

  global_structure:
    description: 'Verifica que la estructura del proyecto cumple el estándar corporativo'
    enabled: true
    related_spec: null
    verifications:
      - id: STRUCT-1
        name: 'AGENTS.md existe'
        type: filesystem
        checks:
          - path: AGENTS.md
            must_exist: true
      - id: STRUCT-2
        name: 'CLAUDE.md existe'
        type: filesystem
        checks:
          - path: CLAUDE.md
            must_exist: true
      - id: STRUCT-3
        name: 'Directorio de specs existe'
        type: filesystem
        checks:
          - path: .ai/specs
            must_exist: true
      - id: STRUCT-4
        name: 'Config de verify existe'
        type: filesystem
        checks:
          - path: .ai/verify/config.yaml
            must_exist: true
      - id: STRUCT-5
        name: 'Directorio de skills existe'
        type: filesystem
        checks:
          - path: .ai/skills
            must_exist: true
      - id: STRUCT-6
        name: 'Canvas del proyecto existe'
        type: filesystem
        checks:
          - path: office_planning.canvas
            must_exist: true

  OP-113_revisar_schema_reservation:
    description: 'Auditoría de ReservationSchema — índices únicos parciales, normalización de fechas y coherencia con IReservation'
    enabled: true
    related_spec: '.ai/specs/OP-113-spec.md'
    verifications:
      - id: OP-113-STRUCT-1
        name: 'reservation.model.ts existe'
        type: filesystem
        checks:
          - path: src/lib/models/reservation.model.ts
            must_exist: true
      - id: OP-113-STRUCT-2
        name: 'domain/types/reservation.ts existe'
        type: filesystem
        checks:
          - path: src/domain/types/reservation.ts
            must_exist: true
      - id: OP-113-STRUCT-3
        name: 'lib/dates.ts (normalización) existe'
        type: filesystem
        checks:
          - path: src/lib/dates.ts
            must_exist: true
      - id: OP-113-STRUCT-4
        name: 'Informe de hallazgos OP-110 existe con sección Reservation'
        type: filesystem
        checks:
          - path: .ai/reports/OP-110-findings.md
            must_exist: true

  OP-114_revisar_tipos_dominio:
    description: 'Auditoría de tipos de dominio — coherencia con schemas, exposición de datos y next-auth.d.ts'
    enabled: true
    related_spec: '.ai/specs/OP-114-spec.md'
    verifications:
      - id: OP-114-STRUCT-1
        name: 'domain/types/user.ts existe'
        type: filesystem
        checks:
          - path: src/domain/types/user.ts
            must_exist: true
      - id: OP-114-STRUCT-2
        name: 'domain/types/service.ts existe'
        type: filesystem
        checks:
          - path: src/domain/types/service.ts
            must_exist: true
      - id: OP-114-STRUCT-3
        name: 'domain/types/next-auth.d.ts existe'
        type: filesystem
        checks:
          - path: src/domain/types/next-auth.d.ts
            must_exist: true
      - id: OP-114-STRUCT-4
        name: 'domain/types/index.ts existe y re-exporta todos los tipos'
        type: filesystem
        checks:
          - path: src/domain/types/index.ts
            must_exist: true

  OP-115_documentar_hallazgos:
    description: 'Verificación del informe consolidado de auditoría OP-110'
    enabled: true
    related_spec: '.ai/specs/OP-115-spec.md'
    verifications:
      - id: OP-115-STRUCT-1
        name: 'Informe OP-110-findings.md existe'
        type: filesystem
        checks:
          - path: .ai/reports/OP-110-findings.md
            must_exist: true
      - id: OP-115-STRUCT-2
        name: 'Spec OP-110 existe con Execution Result'
        type: filesystem
        checks:
          - path: .ai/specs/OP-110-spec.md
            must_exist: true

  OP-123_revisar_reservation_service:
    description: 'Auditoría de reservation.service.ts — reglas de negocio, concurrencia, serialización y helpers'
    enabled: true
    related_spec: '.ai/specs/OP-123-spec.md'
    verifications:
      - id: OP-123-STRUCT-1
        name: 'reservation.service.ts existe'
        type: filesystem
        checks:
          - path: src/services/reservation.service.ts
            must_exist: true
      - id: OP-123-STRUCT-2
        name: 'lib/dates.ts existe (normalizeDate, isValidDateString)'
        type: filesystem
        checks:
          - path: src/lib/dates.ts
            must_exist: true
      - id: OP-123-STRUCT-3
        name: 'domain/types/reservation.ts existe'
        type: filesystem
        checks:
          - path: src/domain/types/reservation.ts
            must_exist: true
      - id: OP-123-STRUCT-4
        name: 'Informe OP-120-findings.md existe con sección reservation.service.ts'
        type: filesystem
        checks:
          - path: .ai/reports/OP-120-findings.md
            must_exist: true

  # === Suites por ticket (añadir conforme se implementen) ===

  OP-112_revisar_schema_table:
    description: 'Auditoría de TableSchema y PositionSchema — solo verificaciones de estructura (sin cambios de código)'
    enabled: true
    related_spec: '.ai/specs/OP-112-spec.md'
    verifications:
      - id: OP-112-STRUCT-1
        name: 'table.model.ts existe'
        type: filesystem
        checks:
          - path: src/lib/models/table.model.ts
            must_exist: true
      - id: OP-112-STRUCT-2
        name: 'domain/types/table.ts existe'
        type: filesystem
        checks:
          - path: src/domain/types/table.ts
            must_exist: true
      - id: OP-112-STRUCT-3
        name: 'Informe de hallazgos OP-110 existe y tiene sección Table'
        type: filesystem
        checks:
          - path: .ai/reports/OP-110-findings.md
            must_exist: true
