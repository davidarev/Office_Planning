  #   verifications:
  #     - id: AC-1
  #       name: 'Usuario autorizado recibe magic link'
  #       type: npm_script
  #       command: npm run test:integration -- --grep "magic link"
  #       expected_result: PASS
  #       exit_code: 0
  #       timeout: 120
